name: Daily ingest

on:
  schedule:
    # Kjøres 03:15 UTC hver dag (Oslo er vanligvis UTC+1/UTC+2)
    - cron: "15 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Fetch dump
        id: fetch
        run: |
          mkdir -p work
          python ingest/fetch_dump.py work > work/fetch_out.txt
          echo "---- fetch_out ----"
          cat work/fetch_out.txt
          SNAPSHOT_DATE=$(sed -n '1p' work/fetch_out.txt)
          RAW_GZ=$(sed -n '2p' work/fetch_out.txt)
          CLEAN_CSV=$(sed -n '3p' work/fetch_out.txt)
          echo "snapshot_date=$SNAPSHOT_DATE" >> $GITHUB_OUTPUT
          echo "raw_gz=$RAW_GZ" >> $GITHUB_OUTPUT
          echo "clean_csv=$CLEAN_CSV" >> $GITHUB_OUTPUT

      - name: Build / update SQLite
        run: |
          mkdir -p db
          mkdir -p work
          mkdir -p docs
          python ingest/build_sqlite.py "${{ steps.fetch.outputs.clean_csv }}" "${{ steps.fetch.outputs.snapshot_date }}" "db/aqua.sqlite" "config/filter.yml"
          gzip -c db/aqua.sqlite > docs/latest.sqlite.gz

      - name: Create or update release "latest"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Opprett release hvis den ikke finnes
          gh release view latest >/dev/null 2>&1 || gh release create latest --title "latest" --notes "Automatisk oppdatert daglig."
          # Last opp assets (overskriver hvis finnes)
          gh release upload latest "${{ steps.fetch.outputs.raw_gz }}" --clobber
          gh release upload latest docs/latest.sqlite.gz --clobber

      - name: Update docs/latest.json
        run: |
          cat > docs/latest.json <<'JSON'
          {
            "snapshot_date": "${{ steps.fetch.outputs.snapshot_date }}",
            "sqlite_gz_url": "./latest.sqlite.gz"
          }
          JSON
          cat docs/latest.json


      - name: Commit latest.json (for GitHub Pages)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/latest.json
          git diff --cached --quiet && echo "Ingen endringer i latest.json" && exit 0
          git commit -m "Update latest.json (${{ steps.fetch.outputs.snapshot_date }})"
          git push
